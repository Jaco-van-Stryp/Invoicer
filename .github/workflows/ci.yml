name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet build --configuration Release

      - name: Run tests
        env:
          DOCKER_API_VERSION: "1.41"
        run: dotnet test Invoicer.Tests --configuration Release --no-build

  build-and-deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          docker build -f ./Dockerfile -t ${REPO_NAME}:latest .

      - name: Deploy
        run: |
          CONTAINER_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${CONTAINER_NAME}:latest"

          docker stop $CONTAINER_NAME 2>/dev/null || true
          docker rm $CONTAINER_NAME 2>/dev/null || true

          docker run -d \
            --name $CONTAINER_NAME \
            --restart unless-stopped \
            --env-file /home/vsjaco/invoicer/.env \
            -p 8080:8080 \
            $IMAGE

          docker image prune -f
